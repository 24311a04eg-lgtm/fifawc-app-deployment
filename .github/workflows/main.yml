name: CI - Build Verification

on:
  pull_request:
    branches:
      - main

jobs:

# =========================
# JOB 1: NODE BUILD CHECK
# =========================
  build-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: backend deps + check
        run: |
          cd backend
          npm install
          node --check server.js

      - name: frontend install + build
        run: |
          cd frontend
          npm install
          npm run build


# =========================
# JOB 2: BUILD + SCAN (FIXED TRIVY)
# =========================
  image-scan:
    runs-on: ubuntu-latest
    needs: build-verification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: build images
        run: |
          docker build -t backend-image ./backend
          docker build -t frontend-image ./frontend

      # -------- FIXED TRIVY (NO INSTALL BUGS) --------
      - name: scan backend image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: backend-image
          format: table
          exit-code: 1

      - name: scan frontend image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: frontend-image
          format: table
          exit-code: 1


# =========================
# JOB 3: RUNTIME TEST (HEALTHCHECK LOOP)
# =========================
  verify-stack:
    runs-on: ubuntu-latest
    needs: image-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: start stack
        run: docker compose up -d

      - name: wait backend
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q backend))

            echo "backend: $status"

            [ "$status" = "healthy" ] && break
            sleep 2
          done

          if [ "$status" != "healthy" ]; then
            docker compose logs backend
            exit 1
          fi

      - name: wait frontend
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend))

            echo "frontend: $status"

            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done

          docker compose logs frontend
          exit 1

      - name: cleanup
        if: always()
        run: docker compose down -v