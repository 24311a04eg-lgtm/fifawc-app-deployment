name: testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------- BACKEND ----------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Backend sanity check
        run: |
          cd backend
          node -e "require('./server.js'); console.log('Backend OK')"

      # ---------------- FRONTEND ----------------
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build